<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lost & Found - Add Item</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='10' y1='10' x2='54' y2='54'%3E%3Cstop stop-color='%23667eea'/%3E%3Cstop offset='1' stop-color='%23764ba2'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect width='64' height='64' rx='14' fill='url(%23g)'/%3E%3Ccircle cx='27' cy='27' r='14' fill='none' stroke='white' stroke-width='6'/%3E%3Cpath d='M38 38 50 50' stroke='white' stroke-width='7' stroke-linecap='round'/%3E%3Cpath d='M23 23h9v9' fill='none' stroke='white' stroke-width='4' stroke-linecap='round' stroke-linejoin='round' opacity='.9'/%3E%3C/svg%3E">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
            color: #333;
        }

        /* Navbar - Same as index.html */
        .navbar {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            padding: 1rem 2rem;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1000;
            box-shadow: 0 2px 20px rgba(0, 0, 0, 0.1);
            transition: all 0.3s ease;
        }

        .nav-container {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 1.8rem;
            font-weight: 700;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-decoration: none;
        }

        .nav-links {
            display: flex;
            list-style: none;
            gap: 2rem;
        }

        .nav-links a {
            text-decoration: none;
            color: #333;
            font-weight: 500;
            padding: 0.5rem 1rem;
            border-radius: 25px;
            transition: all 0.3s ease;
        }

        .nav-links a:hover, .nav-links a.active {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .user-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea, #764ba2);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
        }

        .logout-btn {
            background: #ff6b6b;
            color: white;
            border: none;
            padding: 0.5rem 1.5rem;
            border-radius: 25px;
            cursor: pointer;
            font-weight: 500;
            transition: all 0.3s ease;
        }

        .logout-btn:hover {
            background: #ff5252;
            transform: translateY(-2px);
        }

        /* Main Content */
        .main-container {
            max-width: 900px;
            margin: 8rem auto 2rem;
            padding: 0 2rem;
        }

        .page-header {
            text-align: center;
            margin-bottom: 3rem;
            animation: fadeInUp 0.8s ease-out;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .page-title {
            font-size: 2.5rem;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 1rem;
        }

        /* Form Container */
        .form-container {
            background: white;
            border-radius: 25px;
            padding: 3rem;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
            animation: fadeInUp 0.8s ease-out 0.2s both;
        }

        .form-steps {
            display: flex;
            justify-content: center;
            gap: 1rem;
            margin-bottom: 2.5rem;
        }

        .step {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            color: #999;
            background: #f8f9fa;
            transition: all 0.3s ease;
            position: relative;
        }

        .step.active {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            transform: scale(1.1);
        }

        .step.completed {
            background: #d4edda;
            color: #155724;
        }

        .step.completed::after {
            content: '✓';
            position: absolute;
            font-size: 1.2rem;
        }

        /* Form Grid */
        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2rem;
            margin-bottom: 2rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group.full-width {
            grid-column: 1 / -1;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 600;
            color: #333;
            font-size: 0.95rem;
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 1rem 1.2rem;
            border: 2px solid #e1e5e9;
            border-radius: 12px;
            font-size: 1rem;
            transition: all 0.3s ease;
            background: #f8f9fa;
            font-family: inherit;
        }

        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #667eea;
            background: white;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .form-group textarea {
            resize: vertical;
            min-height: 100px;
        }

        /* Image Upload */
        .image-upload {
            position: relative;
            border: 2px dashed #667eea;
            border-radius: 15px;
            padding: 3rem 2rem;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            background: #f8f9ff;
        }

        .image-upload:hover {
            background: #f0f4ff;
            border-color: #764ba2;
        }

        .image-upload.dragover {
            background: #e3f2fd;
            border-color: #2196f3;
            transform: scale(1.02);
        }

        .upload-icon {
            font-size: 4rem;
            color: #667eea;
            margin-bottom: 1rem;
        }

        .image-preview {
            display: none;
            margin-top: 1rem;
        }

        .image-preview img {
            max-width: 100%;
            max-height: 200px;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }

        /* Type Toggle */
        .type-toggle {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
            justify-content: center;
        }

        .type-btn {
            flex: 1;
            padding: 1rem 2rem;
            border: 2px solid #e1e5e9;
            background: white;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .type-btn.active {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border-color: #667eea;
            transform: translateY(-2px);
        }

        /* Buttons */
        .form-actions {
            display: flex;
            gap: 1rem;
            justify-content: center;
            margin-top: 3rem;
        }

        .btn {
            padding: 1.2rem 3rem;
            border: none;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            min-width: 150px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
        }

        .btn-primary:hover:not(:disabled) {
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.4);
        }

        .btn-secondary {
            background: white;
            color: #666;
            border: 2px solid #e1e5e9;
        }

        .btn-secondary:hover {
            background: #f8f9fa;
            border-color: #667eea;
            color: #667eea;
        }

        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none !important;
        }

        /* Messages */
        .message {
            padding: 1rem 1.5rem;
            border-radius: 12px;
            margin-bottom: 2rem;
            font-weight: 500;
            display: none;
        }

        .message.success {
            background: #d4edda;
            color: #155724;
            border-left: 4px solid #28a745;
        }

        .message.error {
            background: #f8d7da;
            color: #721c24;
            border-left: 4px solid #dc3545;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .nav-links {
                display: none;
            }

            .form-grid {
                grid-template-columns: 1fr;
                gap: 1.5rem;
            }

            .main-container {
                padding: 6rem 1rem 2rem;
            }

            .form-container {
                padding: 2rem 1.5rem;
            }

            .type-toggle {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    
    <!-- Navbar -->
    <nav class="navbar">
        <div class="nav-container">
            <a href="index.html" class="logo">🔍 Lost & Found</a>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="add-item.html" class="active">Add Item</a></li>
                <li><a href="view-items.html">View Items</a></li>
            </ul>
            <div class="user-info">
                <div class="user-avatar" id="userAvatar">U</div>
                <button class="logout-btn" id="logoutBtn">Logout</button>
            </div>
        </div>
    </nav>

    <div class="main-container">
        <div class="page-header">
            <h1 class="page-title">Report Item</h1>
            <p>Help reunite lost items with their owners or report found items</p>
        </div>

        <div class="form-container">
            <div class="message" id="successMsg"></div>
            <div class="message" id="errorMsg"></div>

            <form id="addItemForm">
                <!-- Type Toggle -->
                <div class="type-toggle">
                    <button type="button" class="type-btn active" data-type="lost">I LOST</button>
                    <button type="button" class="type-btn" data-type="found">I FOUND</button>
                </div>

                <input type="hidden" id="itemType" name="itemType" value="lost">

                <div class="form-grid">
                    <div class="form-group">
                        <label for="itemName">Item Name *</label>
                        <input type="text" id="itemName" name="itemName" required placeholder="e.g., Black AirPods Pro">
                    </div>

                    <div class="form-group">
                        <label for="category">Category *</label>
                        <select id="category" name="category" required>
                            <option value="">Select Category</option>
                            <option value="Electronics">Electronics</option>
                            <option value="Bags">Bags & Backpacks</option>
                            <option value="Clothing">Clothing</option>
                            <option value="Accessories">Accessories</option>
                            <option value="Keys">Keys</option>
                            <option value="Documents">Documents</option>
                            <option value="Other">Other</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="location">Location *</label>
                        <input type="text" id="location" name="location" required placeholder="Where did you lose/find it?">
                    </div>

                    <div class="form-group">
                        <label for="date">Date *</label>
                        <input type="date" id="date" name="date" required>
                    </div>

                    <div class="form-group full-width">
                        <label for="description">Description</label>
                        <textarea id="description" name="description" placeholder="Add more details about the item..."></textarea>
                    </div>

                    <div class="form-group full-width">
                        <label>Upload Photo (Optional)</label>
                        <div class="image-upload" id="imageUpload">
                            <div class="upload-icon">📸</div>
                            <p>Click to upload or drag & drop image</p>
                            <p style="font-size: 0.9rem; color: #666;">PNG, JPG up to 5MB</p>
                            <input type="file" id="imageInput" name="imageInput" accept="image/*" style="display: none;">
                        </div>
                        <div class="image-preview" id="imagePreview"></div>
                    </div>

                    <div class="form-group">
                        <label for="contactName">Your Name</label>
                        <input type="text" id="contactName" name="contactName" placeholder="Your full name">
                    </div>

                    <div class="form-group">
                        <label for="contactPhone">Phone Number</label>
                        <input type="tel" id="contactPhone" name="contactPhone" placeholder="Your contact number">
                    </div>

                    <div class="form-group">
                        <label for="contactEmail">Email (Optional)</label>
                        <input type="email" id="contactEmail" name="contactEmail" placeholder="your@email.com">
                    </div>
                </div>

                <div class="form-actions">
                    <button type="button" class="btn btn-secondary" id="resetBtn">Reset Form</button>
                    <button type="submit" class="btn btn-primary" id="submitBtn">
                        Submit Report
                    </button>
                </div>
            </form>
        </div>
    </div>

    <script>
        // Authentication check
        if (localStorage.getItem('isLoggedIn') !== 'true') {
            window.location.href = 'login.html';
        }

        // User info
        const userEmail = localStorage.getItem('userEmail') || 'User';
        document.getElementById('userAvatar').textContent = userEmail.charAt(0).toUpperCase();

        // Logout
        document.getElementById('logoutBtn').addEventListener('click', () => {
            localStorage.removeItem('isLoggedIn');
            localStorage.removeItem('userEmail');
            window.location.href = 'login.html';
        });

        // Form elements
        const form = document.getElementById('addItemForm');
        const submitBtn = document.getElementById('submitBtn');
        const resetBtn = document.getElementById('resetBtn');
        const successMsg = document.getElementById('successMsg');
        const errorMsg = document.getElementById('errorMsg');
        const imageUpload = document.getElementById('imageUpload');
        const imageInput = document.getElementById('imageInput');
        const imagePreview = document.getElementById('imagePreview');

        // Type toggle
        const typeBtns = document.querySelectorAll('.type-btn');
        const itemTypeInput = document.getElementById('itemType');

        typeBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                typeBtns.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                itemTypeInput.value = btn.dataset.type;
            });
        });

        // Image upload
        imageUpload.addEventListener('click', () => imageInput.click());

        imageInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                if (file.size > 5 * 1024 * 1024) {
                    showMessage('Image size must be less than 5MB', false);
                    return;
                }
                const reader = new FileReader();
                reader.onload = (e) => {
                    imagePreview.innerHTML = `<img src="${e.target.result}" alt="Preview">`;
                    imagePreview.style.display = 'block';
                };
                reader.readAsDataURL(file);
            }
        });

        // Drag & drop
        ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(event => {
            imageUpload.addEventListener(event, (e) => {
                e.preventDefault();
                e.stopPropagation();
            });
        });

        imageUpload.addEventListener('dragenter', () => imageUpload.classList.add('dragover'));
        imageUpload.addEventListener('dragleave', () => imageUpload.classList.remove('dragover'));
        imageUpload.addEventListener('drop', (e) => {
            imageUpload.classList.remove('dragover');
            const files = e.dataTransfer.files;
            if (files.length > 0) {
                imageInput.files = files;
                imageInput.dispatchEvent(new Event('change'));
            }
        });

        // Set today's date
        document.getElementById('date').valueAsDate = new Date();

        // Form submission
        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            // Validation
            const formData = new FormData(form);
            const data = Object.fromEntries(formData);
            
            if (!data.itemName?.trim()) {
                showMessage('Item name is required', false);
                return;
            }

            if (!data.category) {
                showMessage('Please select a category', false);
                return;
            }

            if (!data.location?.trim()) {
                showMessage('Location is required', false);
                return;
            }

            // Show loading
            submitBtn.disabled = true;
            submitBtn.innerHTML = 'Submitting... <span style="margin-left: 10px;">⏳</span>';

            // Simulate API call
            setTimeout(() => {
                // Save to localStorage
                const items = JSON.parse(localStorage.getItem('lostFoundItems') || '[]');
                const newItem = {
                    id: Date.now(),
                    ...data,
                    userEmail,
                    createdAt: new Date().toISOString(),
                    status: 'active'
                };
                items.unshift(newItem);
                localStorage.setItem('lostFoundItems', JSON.stringify(items.slice(0, 100))); // Keep last 100

                showMessage('Submitted successfully! Your item report has been saved.', true);
                
                submitBtn.innerHTML = 'Submitted Successfully';

                // Reset form after 3s and redirect
                setTimeout(() => {
                    form.reset();
                    imagePreview.style.display = 'none';
                    window.location.href = 'index.html';
                }, 3000);

            }, 2000);
        });

        // Reset form
        resetBtn.addEventListener('click', () => {
            form.reset();
            imagePreview.style.display = 'none';
            typeBtns[0].classList.add('active');
            typeBtns[1].classList.remove('active');
            itemTypeInput.value = 'lost';
            document.getElementById('date').valueAsDate = new Date();
        });

        // Messages
        function showMessage(text, isSuccess = true) {
            const msg = isSuccess ? successMsg : errorMsg;
            const otherMsg = isSuccess ? errorMsg : successMsg;
            
            otherMsg.style.display = 'none';
            otherMsg.classList.remove('success', 'error');
            msg.classList.remove('success', 'error');
            msg.classList.add(isSuccess ? 'success' : 'error');
            msg.textContent = text;
            msg.style.display = 'block';
            msg.scrollIntoView({ behavior: 'smooth', block: 'center' });
            
            if (isSuccess) {
                setTimeout(() => msg.style.display = 'none', 5000);
            }
        }

        // Navbar scroll effect
        window.addEventListener('scroll', () => {
            const navbar = document.querySelector('.navbar');
            if (window.scrollY > 50) {
                navbar.style.background = 'rgba(255, 255, 255, 0.98)';
                navbar.style.boxShadow = '0 5px 30px rgba(0, 0, 0, 0.15)';
            } else {
                navbar.style.background = 'rgba(255, 255, 255, 0.95)';
                navbar.style.boxShadow = '0 2px 20px rgba(0, 0, 0, 0.1)';
            }
        });

        // Active nav link
        document.querySelector('.nav-links a[href="add-item.html"]').classList.add('active');
    </script>
</body>
</html>
