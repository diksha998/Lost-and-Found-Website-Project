<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lost & Found - Register</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='10' y1='10' x2='54' y2='54'%3E%3Cstop stop-color='%23667eea'/%3E%3Cstop offset='1' stop-color='%23764ba2'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect width='64' height='64' rx='14' fill='url(%23g)'/%3E%3Ccircle cx='27' cy='27' r='14' fill='none' stroke='white' stroke-width='6'/%3E%3Cpath d='M38 38 50 50' stroke='white' stroke-width='7' stroke-linecap='round'/%3E%3Cpath d='M23 23h9v9' fill='none' stroke='white' stroke-width='4' stroke-linecap='round' stroke-linejoin='round' opacity='.9'/%3E%3C/svg%3E">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
        }

        .register-container {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            padding: 3.5rem 3rem;
            border-radius: 25px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.15);
            width: 100%;
            max-width: 480px;
            position: relative;
            animation: slideUp 1s ease-out;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(40px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .logo {
            text-align: center;
            margin-bottom: 2.5rem;
        }

        .logo h1 {
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-size: 2.8rem;
            font-weight: 800;
            margin-bottom: 0.8rem;
        }

        .logo p {
            color: #666;
            font-size: 1.15rem;
        }

        .form-group {
            margin-bottom: 1.8rem;
            position: relative;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.7rem;
            color: #333;
            font-weight: 600;
            font-size: 1rem;
        }

        .form-group input {
            width: 100%;
            padding: 1.2rem 1.4rem;
            border: 2px solid #e1e5e9;
            border-radius: 15px;
            font-size: 1rem;
            transition: all 0.4s ease;
            background: #f8f9fa;
            font-family: inherit;
        }

        .form-group input:focus {
            outline: none;
            border-color: #667eea;
            background: white;
            box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.1);
            transform: translateY(-2px);
        }

        .password-strength {
            height: 4px;
            background: #e1e5e9;
            border-radius: 2px;
            margin-top: 0.5rem;
            overflow: hidden;
        }

        .strength-bar {
            height: 100%;
            transition: all 0.3s ease;
            border-radius: 2px;
        }

        .strength-weak { background: #ff6b6b; width: 33%; }
        .strength-medium { background: #ffa726; width: 66%; }
        .strength-strong { background: #51cf66; width: 100%; }

        .strength-text {
            font-size: 0.85rem;
            margin-top: 0.3rem;
            color: #666;
        }

        .eye-icon {
            position: absolute;
            right: 1.4rem;
            top: 3.4rem;
            cursor: pointer;
            color: #888;
            font-size: 1.3rem;
            transition: color 0.3s ease;
            z-index: 2;
        }

        .eye-icon:hover {
            color: #667eea;
        }

        .register-btn {
            width: 100%;
            padding: 1.4rem;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 15px;
            font-size: 1.2rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.4s ease;
            margin: 1.5rem 0 2rem;
            position: relative;
            overflow: hidden;
        }

        .register-btn:hover:not(:disabled) {
            transform: translateY(-4px);
            box-shadow: 0 15px 35px rgba(102, 126, 234, 0.4);
        }

        .register-btn:active {
            transform: translateY(-2px);
        }

        .register-btn.loading {
            pointer-events: none;
        }

        .register-btn.loading::after {
            content: '';
            position: absolute;
            width: 22px;
            height: 22px;
            top: 50%;
            left: 50%;
            margin-left: -11px;
            margin-top: -11px;
            border: 3px solid transparent;
            border-top: 3px solid #fff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Toggle Section */
        .toggle-section {
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.1), rgba(118, 75, 162, 0.1));
            border: 2px dashed #667eea;
            border-radius: 15px;
            padding: 2rem;
            text-align: center;
            margin: 2rem 0;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .toggle-section:hover {
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.15), rgba(118, 75, 162, 0.15));
            border-color: #764ba2;
        }

        .toggle-icon {
            font-size: 3.5rem;
            margin-bottom: 1rem;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        /* Messages */
        .message {
            padding: 1.2rem 1.5rem;
            border-radius: 12px;
            margin-bottom: 2rem;
            font-weight: 600;
            display: none;
            animation: slideDown 0.4s ease-out;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.success {
            background: linear-gradient(135deg, #d4edda, #c3e6cb);
            color: #155724;
            border-left: 5px solid #28a745;
        }

        .message.error {
            background: linear-gradient(135deg, #f8d7da, #f5c6cb);
            color: #721c24;
            border-left: 5px solid #dc3545;
            animation: shake 0.5s ease-in-out;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-8px); }
            75% { transform: translateX(8px); }
        }

        /* Login Link */
        .login-link {
            text-align: center;
            padding-top: 2rem;
            border-top: 1px solid #e1e5e9;
        }

        .login-link p {
            color: #666;
            margin-bottom: 1rem;
        }

        .login-link a {
            color: #667eea;
            text-decoration: none;
            font-weight: 700;
            font-size: 1.1rem;
            transition: all 0.3s ease;
        }

        .login-link a:hover {
            color: #764ba2;
            text-transform: uppercase;
        }

        /* Responsive */
        @media (max-width: 480px) {
            .register-container {
                margin: 1.5rem;
                padding: 2.5rem 2rem;
            }
            
            .logo h1 {
                font-size: 2.3rem;
            }
        }

        /* Floating particles */
        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: -1;
        }

        .particle {
            position: absolute;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            animation: float 8s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); opacity: 0.7; }
            50% { transform: translateY(-25px) rotate(180deg); opacity: 1; }
        }
    </style>
</head>
<body>
    <div class="particles" id="particles"></div>

    <div class="register-container">
        <div class="logo">
            <h1>🔍 Lost & Found</h1>
            <p>Create your account to get started</p>
        </div>

        <div class="message" id="successMsg"></div>
        <div class="message" id="errorMsg"></div>

        <form id="registerForm">
            <div class="form-group">
                <label for="fullName">Full Name *</label>
                <input type="text" id="fullName" required placeholder="Enter your full name">
            </div>

            <div class="form-group">
                <label for="email">Email Address *</label>
                <input type="email" id="email" required placeholder="your@email.com">
            </div>

            <div class="form-group">
                <label for="phone">Phone Number *</label>
                <input type="tel" id="phone" required placeholder="+1 (555) 123-4567">
            </div>

            <div class="form-group">
                <label for="password">Password *</label>
                <input type="password" id="password" required placeholder="Create a strong password">
                <span class="eye-icon" id="togglePassword">👁️</span>
                <div class="password-strength">
                    <div class="strength-bar" id="strengthBar"></div>
                </div>
                <div class="strength-text" id="strengthText">Enter password</div>
            </div>

            <div class="form-group">
                <label for="confirmPassword">Confirm Password *</label>
                <input type="password" id="confirmPassword" required placeholder="Confirm your password">
            </div>
            <!-- Toggle for demo users -->
            <div class="toggle-section" id="demoToggle">
                <div class="toggle-icon">⚡</div>
                <h3>Quick Demo</h3>
                <p>Click for instant test accounts</p>
            </div>

            <button type="button" class="register-btn" id="registerBtn">
                Create Account
                <a href="index.html"></a>
            </button>
        </form>

        <div class="login-link">
            <p>Already have an account?</p>
            <a href="login.html">Sign in here →</a>
        </div>
    </div>

    <script>
        // Create floating particles
        function createParticles() {
            const container = document.getElementById('particles');
            for (let i = 0; i < 25; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.style.left = Math.random() * 100 + '%';
                particle.style.top = Math.random() * 100 + '%';
                particle.style.width = particle.style.height = (Math.random() * 10 + 3) + 'px';
                particle.style.animationDelay = Math.random() * 8 + 's';
                particle.style.animationDuration = (Math.random() * 4 + 6) + 's';
                container.appendChild(particle);
            }
        }

        // Password toggle
        const togglePassword = document.getElementById('togglePassword');
        const passwordInput = document.getElementById('password');
        togglePassword.addEventListener('click', () => {
            const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
            passwordInput.setAttribute('type', type);
            togglePassword.textContent = type === 'password' ? '👁️' : '🙈';
        });

        // Password strength
        passwordInput.addEventListener('input', () => {
            const password = passwordInput.value;
            const strengthBar = document.getElementById('strengthBar');
            const strengthText = document.getElementById('strengthText');
            
            let strength = 0;
            let text = 'Enter password';
            
            if (password.length >= 8) strength++;
            if (/[a-z]/.test(password)) strength++;
            if (/[A-Z]/.test(password)) strength++;
            if (/[0-9]/.test(password)) strength++;
            if (/[^A-Za-z0-9]/.test(password)) strength++;
            
            strengthBar.className = 'strength-bar';
            
            switch (strength) {
                case 0: case 1:
                    strengthBar.classList.add('strength-weak');
                    text = 'Too weak';
                    break;
                case 2: case 3:
                    strengthBar.classList.add('strength-medium');
                    text = 'Medium';
                    break;
                case 4: case 5:
                    strengthBar.classList.add('strength-strong');
                    text = 'Strong';
                    break;
            }
            
            strengthText.textContent = text;
            validatePasswordMatch();
        });

        const confirmPasswordInput = document.getElementById('confirmPassword');

        function validatePasswordMatch() {
            if (confirmPasswordInput.value && passwordInput.value !== confirmPasswordInput.value) {
                confirmPasswordInput.setCustomValidity('Passwords do not match');
            } else {
                confirmPasswordInput.setCustomValidity('');
            }
        }

        confirmPasswordInput.addEventListener('input', validatePasswordMatch);

        // Demo toggle
        const demoToggle = document.getElementById('demoToggle');
        const demoUsers = [
            { name: 'Admin User', email: 'admin@lostfound.com', phone: '+1 (555) 000-1234', password: 'admin123' },
            { name: 'Test User', email: 'user@example.com', phone: '+1 (555) 000-5678', password: 'password123' }
        ];

        let demoIndex = 0;
        demoToggle.addEventListener('click', () => {
            const user = demoUsers[demoIndex % demoUsers.length];
            document.getElementById('fullName').value = user.name;
            document.getElementById('email').value = user.email;
            document.getElementById('phone').value = user.phone;
            document.getElementById('password').value = user.password;
            document.getElementById('confirmPassword').value = user.password;
            
            // Trigger password strength
            passwordInput.dispatchEvent(new Event('input'));
            
            demoIndex++;
            showMessage("Demo account loaded!", true);
        });

        // Form submission
        const form = document.getElementById('registerForm');
        const registerBtn = document.getElementById('registerBtn');
        const successMsg = document.getElementById('successMsg');
        const errorMsg = document.getElementById('errorMsg');

        function createAccount(e) {
            if (e) e.preventDefault();

            validatePasswordMatch();
            if (!form.reportValidity()) {
                if (confirmPasswordInput.validationMessage === 'Passwords do not match') {
                    showMessage('Passwords do not match', false);
                }
                return;
            }
            
            const fullName = document.getElementById('fullName').value.trim();
            const email = document.getElementById('email').value.trim().toLowerCase();
            const phone = document.getElementById('phone').value.trim();
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;

            // Validation
            if (!fullName || !email || !phone || !password) {
                showMessage('Please fill in all fields', false);
                return;
            }

            if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
                showMessage('Please enter a valid email address', false);
                return;
            }

            if (password.length < 6) {
                showMessage('Password must be at least 6 characters long', false);
                return;
            }

            if (password !== confirmPassword) {
                showMessage('Passwords do not match', false);
                return;
            }

            // Show loading
            registerBtn.disabled = true;
            registerBtn.textContent = 'Creating Account...';

            try {
                const users = JSON.parse(localStorage.getItem('lostFoundUsers') || '[]');
                const existingUserIndex = users.findIndex(u => u.email === email);

                // Save user
                const newUser = {
                    id: existingUserIndex >= 0 ? users[existingUserIndex].id : Date.now(),
                    fullName,
                    email,
                    phone,
                    password,
                    createdAt: existingUserIndex >= 0 ? users[existingUserIndex].createdAt : new Date().toISOString(),
                    updatedAt: new Date().toISOString()
                };

                if (existingUserIndex >= 0) {
                    users[existingUserIndex] = newUser;
                } else {
                    users.push(newUser);
                }

                localStorage.setItem('lostFoundUsers', JSON.stringify(users));
                
                // Auto-login
                localStorage.setItem('isLoggedIn', 'true');
                localStorage.setItem('userEmail', email);
                localStorage.setItem('currentUser', JSON.stringify(newUser));
                localStorage.setItem('registrationSuccess', 'true');
                
                window.location.href = 'index.html';
            } catch (error) {
                registerBtn.disabled = false;
                registerBtn.textContent = 'Create Account';
                showMessage('Account save nahi ho pa raha. Please browser storage enable karke retry karein.', false);
            }
        }

        registerBtn.addEventListener('click', createAccount);
        form.addEventListener('submit', createAccount);

        function showMessage(text, isSuccess = true) {
            const msg = isSuccess ? successMsg : errorMsg;
            const otherMsg = isSuccess ? errorMsg : successMsg;
            
            otherMsg.style.display = 'none';
            otherMsg.classList.remove('success', 'error');
            msg.classList.remove('success', 'error');
            msg.classList.add(isSuccess ? 'success' : 'error');
            msg.textContent = text;
            msg.style.display = 'block';
            msg.scrollIntoView({ behavior: 'smooth', block: 'center' });
            
            if (isSuccess) {
                setTimeout(() => {
                    msg.style.display = 'none';
                }, isSuccess ? 4000 : 6000);
            }
        }

        // Initialize
        createParticles();

        // Enter key support
        document.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && !registerBtn.disabled) {
                createAccount(e);
            }
        });

        // Phone input formatting
        document.getElementById('phone').addEventListener('input', (e) => {
            let value = e.target.value.replace(/\D/g, '');
            if (value.length >= 10) {
                value = value.replace(/(\d{3})(\d{3})(\d{4})/, '($1) $2-$3');
            }
            e.target.value = value;
        });
    </script>
</body>
</html>
